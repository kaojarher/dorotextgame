<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: "微軟正黑體", sans-serif;
  background: #1a1a1a;
  color: #fff;
  font-size: 36px; 
  line-height: 1.5;
}

.game-container {
  max-width: 100%;
  margin: 0;
  padding: 10px;
}

.character-panel {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 10px;
}

.character {
  background: #333;
  padding: 10px;
  border-radius: 8px;
  flex: none;
}

.status-panel {
  background: #333;
  width: 49%;
  border-radius: 8px;
  margin-bottom: 10px;
}

.dialogue-panel {
  background: #333;
  padding: 10px;
  border-radius: 8px;
  height: 180px;
  overflow-y: auto;
  font-size: 36px; 
}

.battle-panel {
  background: #333;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.battle-panel {
  margin-bottom: 10px;
}

.button {
  background: #4CAF50;
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 36px; 
  min-width: 80px;
}

.button:hover {
  background: #45a049;
}

.progress-bar {
  width: 100%;
  height: 24px; 
  background: #555;
  border-radius: 8px;
  overflow: hidden;
  margin: 3px 0;
}

.progress-bar-fill {
  height: 100%;
  background: #4CAF50;
  transition: width 0.3s ease;
}

.npc {
  padding: 8px;
  margin: 4px;
  border: 1px solid #555;
  border-radius: 4px;
  font-size: 36px; 
}

.npc:hover {
  background: #444;
}

.chat-input {
  display: flex;
  gap: 5px;
  margin-top: 10px;
}

.chat-input input {
  flex: 1;
  padding: 8px;
  font-size: 36px; 
}

.chat-input input:focus {
  outline: none;
  background: #666;
}

.character-selector {
  margin-bottom: 8px;
}

.character-selector select {
  padding: 8px;
  font-size: 36px; 
  width: 100%;
}

.save-load {
  margin-bottom: 8px;
  display: flex;
  gap: 5px;
}

h1 {
  font-size: 36; 
  margin: 10px 0;
}

h2 {
  font-size: 36px; 
  margin: 8px 0;
}

.inventory-panel {
  background: #333;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px;
  margin: 6px 0;
  background: #444;
  border-radius: 4px;
}

.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
}

.modal-content {
  margin: 5% auto;
  padding: 15px;
  width: 95%;
  max-width: none;
  border-radius: 8px;
  max-height: 90vh;
}

.stats-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 5px;
}

.stat-item {
  padding: 8px;
  background: #444;
  border-radius: 4px;
}

.soul-ring-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px;
  margin: 6px 0;
  background: #444;
  border-radius: 4px;
}

.soul-ring-item button {
  margin-left: 5px;
}

.team-stats {
  background: #333;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.training-animation {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1000;
  opacity: 0;
  transition: opacity 0.3s;
}

.training-animation.active {
  opacity: 1;
}

.training-particle {
  position: absolute;
  width: 10px;
  height: 10px;
  background: rgba(255, 255, 255, 0.8);
  border-radius: 50%;
  pointer-events: none;
}

#arena-status {
  margin: 5px 0;
  font-size: 36px;
}

#arena-rewards {
  margin-top: 5px;
}

@media (orientation: landscape) {
  body {
    font-size: 36px; 
  }
  
  h1 {
    font-size: 36px; 
  }
  
  h2 {
    font-size: 36px; 
  }
  
  .button, .dialogue-panel, .npc, .chat-input input, .character-selector select {
    font-size: 36px; 
  }
  
  .character-panel {
    flex-direction: row;
    flex-wrap: wrap;
  }

  .character {
    width: calc(50% - 5px);
  }
}
</style>

function challengeDungeon(level) {
  const char = characters[currentCharacter];
  const dungeon = dungeons[level - 1];
  if (char.level < dungeon.minLevel) {
    addDialogue(`等級不足！需要等級 ${dungeon.minLevel}`);
    return;
  }
  if (char.soulPower < dungeon.soulPowerReq) {
    addDialogue(`魂力不足！需要魂力 ${dungeon.soulPowerReq}`);
    return;
  }
  const levelDiff = char.level - dungeon.minLevel;
  const soulPowerDiff = char.soulPower - dungeon.soulPowerReq;
  const successRate = Math.min(0.9, 0.5 + levelDiff * 0.02 + soulPowerDiff * 0.01);
  if (Math.random() < successRate) {
    const rewards = {
      gold: dungeon.reward,
      exp: Math.floor(dungeon.reward / 10),
      soulPower: Math.floor(level / 2)
    };
    const extraReward = Math.random();
    if (extraReward < 0.1) {
      const bone = items.soulBone[Math.floor(Math.random() * items.soulBone.length)];
      const quality = ['普通', '優秀', '稀有', '史詩'][Math.floor(Math.random() * 4)];
      const soulBone = {
        name: bone,
        type: 'soulBone',
        quality: quality,
        value: Math.floor(Math.random() * 2000) + 500
      };
      char.inventory.push(soulBone);
      addDialogue(`獲得${quality}品質的魂骨 ${bone}！`);
    } else if (extraReward < 0.3) {
      const colors = ['黃', '紫', '黑'];
      const color = colors[Math.min(Math.floor(level / 7), colors.length - 1)];
      char.soulRings.push(color);
      addDialogue(`獲得${color}色魂環！`);
    }
    char.gold += rewards.gold;
    char.exp += rewards.exp;
    char.soulPower += rewards.soulPower;
    addDialogue(`成功通過第${level}關！`);
    addDialogue(`獲得獎勵：${rewards.gold}金幣，${rewards.exp}經驗，${rewards.soulPower}魂力`);
  } else {
    const penaltyExp = Math.floor(dungeon.reward / 20);
    char.exp = Math.max(0, char.exp - penaltyExp);
    addDialogue(`挑戰失敗，失去${penaltyExp}經驗值...`);
  }
  updateUI();
}
function enterArena() {
  const char = characters[currentCharacter];
  const arenaFee = 2000;
  if (char.gold < arenaFee) {
    addDialogue('金幣不足！需要2000金幣參加比賽。');
    return;
  }
  char.gold -= arenaFee;
  const opponents = Object.keys(characters).filter(name => name !== currentCharacter);
  if (opponents.length === 0) {
    addDialogue('沒有對手可以比賽！');
    char.gold += arenaFee;
    return;
  }
  const opponent = opponents[Math.floor(Math.random() * opponents.length)];
  const opponentChar = characters[opponent];
  const charPower = char.attack + char.defense + char.soulRings.length * 100 + char.soulPower;
  const opponentPower = opponentChar.attack + opponentChar.defense + opponentChar.soulRings.length * 100 + opponentChar.soulPower;
  const charRoll = Math.random() * charPower;
  const opponentRoll = Math.random() * opponentPower;
  addDialogue(`${currentCharacter} VS ${opponent}！`);
  if (charRoll > opponentRoll) {
    const rewards = generateArenaRewards();
    char.inventory.push(rewards);
    char.gold += 1000;
    addDialogue(`${currentCharacter} 獲勝！獲得 1000 金幣！`);
    addDialogue(`獲得獎勵: ${rewards.quality} ${rewards.name}`);
  } else {
    char.gold += 200;
    addDialogue(`${currentCharacter} 戰敗...獲得安慰獎 200 金幣`);
  }
  updateUI();
}
function generateArenaRewards() {
  const types = ['weapon', 'armor', 'accessory', 'soulBone'];
  const type = types[Math.floor(Math.random() * types.length)];
  const itemList = items[type];
  const itemName = itemList[Math.floor(Math.random() * itemList.length)];
  const qualities = ['普通', '優秀', '稀有', '史詩'];
  const qualityWeights = [0.5, 0.3, 0.15, 0.05];
  let quality = '普通';
  const roll = Math.random();
  let accumWeight = 0;
  for (let i = 0; i < qualities.length; i++) {
    accumWeight += qualityWeights[i];
    if (roll <= accumWeight) {
      quality = qualities[i];
      break;
    }
  }
  return {
    name: itemName,
    type: type,
    quality: quality,
    value: Math.floor(Math.random() * 1000) + 500
  };
}

function getItemStats(item) {
  const stats = {
    attack: 0,
    defense: 0
  };
  const quality = {
    '普通': 1,
    '優秀': 1.5,
    '稀有': 2,
    '史詩': 3
  };

    weapon: {

      defense: 0
    },
    armor: {

    },

    }

function loadGame() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = function (event) {
      try {
        const saveData = JSON.parse(event.target.result);
        Object.assign(characters, saveData.characters);
        currentCharacter = saveData.currentCharacter;
        dialogueHistory = saveData.dialogueHistory || [];
        marketItems = saveData.marketItems || [];
        drawnCharacters = saveData.drawnCharacters || 0;
        Object.assign(dungeons, saveData.dungeons || []);
        const dialogueBox = document.getElementById('dialogue-box');
        dialogueBox.innerHTML = '';
        dialogueHistory.forEach(text => {
          const div = document.createElement('div');
          div.textContent = text;
          dialogueBox.appendChild(div);
        });
        document.getElementById('active-character').value = currentCharacter;
        updateUI();
        addDialogue('遊戲讀取成功！');
      } catch (error) {
        addDialogue('讀取失敗：無效的存檔文件');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

      response = responses[Math.floor(Math.random() * responses.length)];
      break;
    }
  }
  if (!response) {

  }, 500);

function equipItem(index) {
  const char = characters[currentCharacter];
  const item = char.inventory[index];
  if (isEquipped(item)) {
    if (item.type === 'soulBone') {
      for (const slot in char.soulBoneSlots) {
        if (char.soulBoneSlots[slot] === item) {
          char.soulBoneSlots[slot] = null;
          char.soulPower -= item.quality === '史詩' ? 20 : item.quality === '稀有' ? 15 : item.quality === '優秀' ? 10 : 5;
          break;
        }
      }
    } else {
      char.equipment[item.type] = null;
    }
    addDialogue(`${currentCharacter} 卸下了 ${item.name}`);
  } else {
    if (item.type === 'soulBone') {
      const slotMap = {
        '頭骨': 'head',
        '左臂骨': 'leftArm',
        '右臂骨': 'rightArm',
        '左腿骨': 'leftLeg',
        '右腿骨': 'rightLeg',
        '脊椎骨': 'spine'
      };
      const slot = slotMap[item.name];
      if (slot) {
        if (char.soulBoneSlots[slot]) {
          char.inventory.push(char.soulBoneSlots[slot]);
          char.soulPower -= char.soulBoneSlots[slot].quality === '史詩' ? 20 : char.soulBoneSlots[slot].quality === '稀有' ? 15 : char.soulBoneSlots[slot].quality === '優秀' ? 10 : 5;
        }
        char.soulBoneSlots[slot] = item;
        char.soulPower += item.quality === '史詩' ? 20 : item.quality === '稀有' ? 15 : item.quality === '優秀' ? 10 : 5;
        char.inventory.splice(index, 1);
      }
    } else {
      if (char.equipment[item.type]) {
        char.inventory.push(char.equipment[item.type]);
      }
      char.equipment[item.type] = item;
      char.inventory.splice(index, 1);
    }
    addDialogue(`${currentCharacter} 裝備了 ${item.name}`);
  }
  updateUI();
}
function isEquipped(item) {
  const char = characters[currentCharacter];
  if (item.type === 'soulBone') {
    return Object.values(char.soulBoneSlots).includes(item);
  }
  return char.equipment[item.type] === item;
}

    '黑': 10000
  };
  const value = ringValues[ring] || 1000;
  char.soulRings.splice(index, 1);
  const soulBeastLevel = Math.floor(char.level / 10) * 10;
  char.attack -= soulBeastLevel * 2;
  char.defense -= soulBeastLevel;
  char.gold += value;
  addDialogue(`${currentCharacter} 售出了${ring}色魂環，獲得${value}金幣`);
  updateUI();
}
function drawCharacter() {
  if (drawnCharacters >= 20) {
    addDialogue('已達到抽取角色上限(20個)！');
    return;
  }
  const char = characters[currentCharacter];
  const drawCost = 1000;
  if (char.gold < drawCost) {
    addDialogue('金幣不足！需要1000金幣。');
    return;
  }
  char.gold -= drawCost;
  const availableChars = possibleCharacters.filter(name => !characters.hasOwnProperty(name));
  if (availableChars.length === 0) {
    addDialogue('沒有更多可抽取的角色了！');
    char.gold += drawCost;
    return;
  }
  const newCharName = availableChars[Math.floor(Math.random() * availableChars.length)];
  characters[newCharName] = {
    level: 1,
    exp: 0,
    expNeeded: 100,
    energy: 100,
    soulPower: 10,
    training: false,
    soulRings: [],
    武魂: '未知',
    inventory: [],
    equipment: {
      weapon: null,
      armor: null,
      accessory: null,
      soulBone: null
    },
    gold: 1000,
    attack: 0,
    defense: 0,
    soulBones: [],
    soulBoneSlots: {
      head: null,
      leftArm: null,
      rightArm: null,
      leftLeg: null,
      rightLeg: null,
      spine: null
    }
  };
  drawnCharacters++;
  const activeSelect = document.getElementById('active-character');
  const option1 = document.createElement('option');
  option1.value = newCharName;
  option1.textContent = newCharName;
  activeSelect.appendChild(option1);
  addDialogue(`恭喜！抽到了新角色 ${newCharName}！(已抽取 ${drawnCharacters}/20)`);
  updateUI();
}
function createTrainingParticle() {
  const container = document.getElementById('training-animation');
  const particle = document.createElement('div');
  particle.className = 'training-particle';
  const startX = Math.random() * window.innerWidth;
  const startY = window.innerHeight;
  particle.style.left = `${startX}px`;
  particle.style.top = `${startY}px`;
  container.appendChild(particle);
  const animation = particle.animate([{
    transform: `translate(0, 0)`
  }, {
    transform: `translate(${(Math.random() - 0.5) * 200}px, -${window.innerHeight + 10}px)`
  }], {
    duration: 2000,
    easing: 'ease-out'
  });
  animation.onfinish = () => {
    particle.remove();
  };
}
setInterval(recoverEnergy, 1000);
updateUI();</script>
